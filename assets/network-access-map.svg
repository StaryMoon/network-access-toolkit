<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-label="Network access toolkit map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17406b" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 800 36px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #10233f; }
      .sub { font: 500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #52627a; }
      .box-title { font: 750 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #13243c; }
      .box-sub { font: 500 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #637188; }
      .tag { font: 700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #2463eb; }
      .line { stroke: #90a8c8; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 6 10; }
    </style>
  </defs>
  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="90" r="118" fill="#dbeafe" opacity="0.55"/>
  <circle cx="170" cy="460" r="132" fill="#e0f2fe" opacity="0.65"/>
  <text x="70" y="82" class="title">学生科研党网络连通性工具箱</text>
  <text x="72" y="116" class="sub">远程服务器 · 自建组网 · 内网穿透 · SSH 排障 · 文件同步 · 合法网络工具</text>

  <path d="M255 292 C390 190, 465 190, 585 292" class="line" fill="none"/>
  <path d="M695 292 C820 190, 900 190, 1025 292" class="line" fill="none"/>
  <path d="M255 292 C410 395, 855 395, 1025 292" class="line" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="70" y="205" width="270" height="170" rx="24" fill="#ffffff"/>
    <text x="100" y="255" class="box-title">远程开发</text>
    <text x="100" y="285" class="box-sub">VS Code Remote SSH / Mosh</text>
    <text x="100" y="320" class="tag">GPU 服务器 · 实验室机器</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="505" y="205" width="270" height="170" rx="24" fill="#ffffff"/>
    <text x="535" y="255" class="box-title">多设备组网</text>
    <text x="535" y="285" class="box-sub">Tailscale / ZeroTier / Headscale</text>
    <text x="535" y="320" class="tag">NAS · 台式机 · 远程 SSH</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="205" width="270" height="170" rx="24" fill="#ffffff"/>
    <text x="970" y="255" class="box-title">公网访问</text>
    <text x="970" y="285" class="box-sub">Cloudflare Tunnel / frp / ngrok</text>
    <text x="970" y="320" class="tag">Web demo · Webhook · 内网服务</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="335" y="405" width="270" height="92" rx="22" fill="#ffffff"/>
    <text x="365" y="455" class="box-title">底层隧道</text>
    <text x="365" y="482" class="box-sub">WireGuard / OpenVPN</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="675" y="405" width="270" height="92" rx="22" fill="#ffffff"/>
    <text x="705" y="455" class="box-title">数据同步</text>
    <text x="705" y="482" class="box-sub">rclone / rsync / scp</text>
  </g>
</svg>
